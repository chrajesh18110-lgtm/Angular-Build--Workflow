name: Build my Angular App

on:
   push:
     branches: [main]

jobs:
  build-angular-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Node Js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm install
        working-directory: my-app 
      - name: Build Angular App
        run: npm run build
        working-directory: my-app 
